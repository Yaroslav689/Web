<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREENMIND</title>
    <link rel="stylesheet" href="assets/styles/normalize.css">
    <link rel="stylesheet" href="assets/styles/styles.css">
</head>
<body>
    <header class="header">
        <div class="header__left">
            <a class="header__logo" href="#">GREENMIND</a>
            <nav class="header__nav">
                <ul>
                    <li><a class="header__link--home" href="#">Home</a></li>
                    <li><a class="header__link--products" href="#">Products</a></li>
                    <li><a class="header__link--contacts" href="#">Contacts</a></li>
                </ul>
            </nav>
        </div>
        <div class="header__actions">
            <a href="#"><img src="assets/img/icons/cart.png" alt="cart"></a>
            <a href="#"><img src="assets/img/icons/profile.png" alt="profile"></a>
            <a href="#"><img src="assets/img/icons/search.png" alt="search" class="search-icon"></a>
            <a href="#"><img src="assets/img/icons/dots.png" alt="dots"></a>
        </div>
    </header>
    <main class="main">
        <section class="hero">
            <div class="hero__content">
                <div class="hero__info">
                    <h1><a href="#">Buy your dream plants</a></h1>
                    <div class="hero__stats">
                        <div class="hero__stats--left">
                            <span class="hero__stats-number">50+</span>
                            <span class="hero__stats-label">Plant Species</span>
                        </div>
                        <div class="hero__divider"></div>
                        <div class="hero__stats--right">
                            <span class="hero__stats-number">100+</span>
                            <span class="hero__stats-label customers">Customers</span>
                        </div>
                    </div>
                    <div class="hero__search">
                       <input type="text" placeholder="What are you looking for?">
                       <button><img src="assets/img/hero/btn-search.png" alt="search"></button>
                    </div>   
                </div>
                <div class="hero__media">
                    <div class="hero__rounded-square"></div>
                    <img class="hero__image-hand" src="assets/img/hero/hand.png" alt="hand">
                    <img class="hero__arrow--left" src="assets/img/hero/arrow1.png" alt="arrow1">
                    <img class="hero__arrow--right" src="assets/img/hero/arrow2.png" alt="arrow2">
                </div>
            </div>
        </section>
        <section class="product">
            <div class="product__content">
                <div class="product__info">
                    <h2><a href="#">Best Selling Plants</a></h2>
                    <p>Easiest way to healthy life by buying your favorite plants</p>
                    <button>
                        See more
                        <img src="assets/img/product/btn-arrow.png">
                    </button>   
                </div>    
                <div class="product__media">
                    <a href="#"><img src="assets/img/product/frame-1.png" alt="frame-1"></a>
                    <small class="product__plant-name">Natural Plant</small>
                    <small class="product__plant-price">$14.00</small>
                </div>
                <div class="product__media">
                    <a href="#"><img src="assets/img/product/frame-2.png" alt="frame-2"></a>
                    <small class="product__plant-name">Artificial Plant</small>
                    <small class="product__plant-price">$9.00</small>
                </div>
                <div class="product__media">
                    <a href="#"><img src="assets/img/product/frame-3.png" alt="frame-3"></a>
                    <small class="product__plant-name">Natural Plant</small>
                    <small class="product__plant-price">$35.00</small>
                </div>
            </div>
        </section>
    </main>
</body
